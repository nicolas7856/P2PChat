<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AirChat P2P Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    
    <script src="lz-string.min.js"></script>
    <script src="qrious.min.js"></script>
    <script src="jsQR.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --danger: #e74c3c; --bg: #ecf0f1; --text: #34495e; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; position: absolute; }
        .screen.active { display: flex; }
        .hidden { display: none !important; }

        header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; position: relative; }
        .content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }

        input[type="text"] { padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 15px; width: 100%; max-width: 300px; font-size: 16px; }
        button { padding: 12px 20px; border: none; border-radius: 8px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
        .btn-primary { width: 100%; max-width: 300px; margin-bottom: 10px; }
        .btn-danger { background: var(--danger); }

        /* Dashboard & Contacts */
        .contact-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; width: 100%; max-width: 350px; cursor: pointer; border-left: 6px solid var(--accent); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .contact-info { overflow: hidden; }
        .contact-info strong { display: block; color: var(--primary); }
        .contact-info small { color: #888; white-space: nowrap; }

        /* QR & Scanner */
        #qr-container { text-align: center; padding: 20px; width: 100%; }
        #qr-canvas { background: white; padding: 10px; border-radius: 12px; max-width: 250px; width: 100%; height: auto; }
        #scanner-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        #scanner-video { width: 100%; height: 100%; object-fit: cover; }
        .scanner-ui { position: absolute; bottom: 30px; width: 100%; text-align: center; }

        /* Chat UI */
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fdfdfd; }
        .message { padding: 10px 14px; border-radius: 15px; max-width: 80%; position: relative; font-size: 15px; line-height: 1.4; }
        .message.sent { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 2px; }
        .message.received { align-self: flex-start; background: white; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg-meta { font-size: 10px; color: #999; display: block; margin-top: 4px; text-align: right; }
        .msg-media { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; }
        
        /* Doppie Spunte */
        .ticks { margin-left: 4px; font-weight: bold; }
        .ticks.ack { color: #34b7f1; }

        footer { background: white; padding: 10px; display: flex; gap: 8px; align-items: center; border-top: 1px solid #ddd; }
        #message-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        #attach-btn { background: none; color: var(--primary); font-size: 22px; padding: 5px; }

        /* Loader */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active">
        <header>AirChat P2P</header>
        <div class="content" style="justify-content: center;">
            <input type="text" id="username-input" placeholder="Tuo Nome Utente" maxlength="12">
            <button id="login-button" class="btn-primary" style="background: var(--primary);">Accedi al Nodo</button>
        </div>
    </div>

    <div id="screen-connect" class="screen">
        <header>Nodo: <span id="my-name-display"></span></header>
        <div class="content">
            <div id="main-actions" class="action-buttons" style="width: 100%; text-align: center;">
                <button id="start-hosting" class="btn-primary">📡 Nuova Chat (Host)</button>
                <button id="start-scanning" class="btn-primary">📷 Scansiona Amico (Client)</button>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
                <h3 style="margin-bottom: 15px; color: var(--primary);">Conversazioni Recenti</h3>
                <div id="contacts-list"></div>
            </div>

            <div id="qr-container" class="hidden">
                <p id="qr-instruction" style="font-weight: bold; margin-bottom: 15px;"></p>
                <canvas id="qr-canvas"></canvas>
                <div id="host-controls" class="hidden" style="margin-top: 20px;">
                    <button id="host-scan-step" style="background: var(--primary);">Scansiona Risposta Amico</button>
                </div>
                <button onclick="location.reload()" class="btn-danger" style="margin-top: 30px;">Annulla</button>
            </div>

            <div id="connection-loading" class="hidden" style="text-align: center; margin-top: 50px;">
                <div class="loader"></div>
                <p style="margin-top: 15px; font-weight: bold;">Sincronizzazione P2P...</p>
            </div>
        </div>
    </div>

    <div id="screen-chat" class="screen">
        <header>
            <button onclick="location.reload()" style="position: absolute; left: 10px; top: 12px; background: none; font-size: 18px;">✕</button>
            Chat con: <span id="peer-name-display"></span>
            <div id="chat-status-dot" style="width:10px; height:10px; background: var(--accent); border-radius: 50%; display: inline-block; margin-left: 5px;"></div>
        </header>
        <div id="chat-messages"></div>
        <footer>
            <input type="file" id="file-input" class="hidden" accept="image/*,video/*">
            <button id="attach-btn">📎</button>
            <input type="text" id="message-input" placeholder="Scrivi...">
            <button id="send-button">Invia</button>
        </footer>
    </div>

    <div id="scanner-container" class="hidden">
        <video id="scanner-video" playsinline></video>
        <div class="scanner-ui">
            <button id="stop-scanning" class="btn-danger">Annulla</button>
        </div>
        <canvas id="scanner-canvas" class="hidden"></canvas>
    </div>

    <script src="app.js"></script>
</body>
</html>
